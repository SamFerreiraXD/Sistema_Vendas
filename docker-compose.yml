version: "3.9"

services:
  # ---------------------------------------------------------------
  # Banco de dados MySQL
  # ---------------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: erp_pdv_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - erp_network

  # ---------------------------------------------------------------
  # API FastAPI
  # ---------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erp_pdv_api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
    networks:
      - erp_network

volumes:
  db_data:
    driver: local

networks:
  erp_network:
    driver: bridge
