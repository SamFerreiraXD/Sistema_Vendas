[alembic]
# Caminho para o diretório com os scripts de migração
script_location = alembic

# Template usado para o nome dos arquivos de migração (inclui data/hora
# para facilitar localizar migrações em ordem cronológica)
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Fuso horário usado para gerar os timestamps acima
timezone = America/Sao_Paulo

# A URL real do banco é definida dinamicamente em alembic/env.py,
# a partir das variáveis de ambiente (settings.DATABASE_URL).
# Deixe vazio aqui — não duplique credenciais em dois lugares.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
